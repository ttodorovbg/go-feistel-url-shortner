# .golangci.yml
version: "2" # Required for v2 schema & parser

linters:
  default: none # Opt out of implicit defaults for full control
  enable:
    # Core v2 defaults (high signal, keep these)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
#     # Recommended additions (production-grade)
#     - gocritic # Catches subtle bugs, performance issues, anti-patterns
#     - gosec # Security vulnerability scanner
#     - bodyclose # Prevents HTTP response body leaks (goroutine/memory)
#     - nilerr # Catches `return nil` when `err != nil`
#     - predeclared # Prevents shadowing built-ins (`len`, `copy`, `new`, etc.)
#     - revive # Modern, fast, configurable replacement for deprecated `golint`
#     - wastedassign # Finds redundant assignments (complements `ineffassign`)
#     - tparallel # Catches incorrect `t.Parallel()` usage in tests

